name: Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@76071ef0d7ec797419534e8a2bcbfb9a76541260 # 0.28.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab0761 # v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        
    - name: Check Backend Dependencies
      working-directory: awesome-mail
      run: |
        npm ci
        npm audit --audit-level moderate || true
        npm outdated || true
        
    - name: Check Flutter Dependencies
      working-directory: awesome_mail_flutter
      run: |
        flutter pub deps --style=compact
        flutter pub outdated || true

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Install Backend Dependencies
      working-directory: awesome-mail
      run: npm ci
      
    - name: Get Flutter Dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run Backend Linting
      working-directory: awesome-mail
      run: npm run lint
      
    - name: Run Flutter Analysis
      working-directory: awesome_mail_flutter
      run: flutter analyze --fatal-warnings lib test
      
    - name: Check Backend Code Formatting
      working-directory: awesome-mail
      run: npx prettier --check "src/**/*.ts"
      
    - name: Check Flutter Code Formatting
      working-directory: awesome_mail_flutter
      run: dart format --set-exit-if-changed lib test

  test-coverage-report:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        
    - name: Install Backend Dependencies
      working-directory: awesome-mail
      run: npm ci

    - name: Run Backend Tests with Coverage
      working-directory: awesome-mail
      run: npm run test:coverage
      
    # Flutter coverage 因 Flutter 框架已知的 segfault bug 而停用
    # https://github.com/flutter/flutter/issues/124145
    # Flutter 測試由 awesome_mail_flutter 自身的 CI 負責驗證

    - name: Generate Coverage Report
      run: |
        echo "# Test Coverage Report" > coverage-report.md
        echo "" >> coverage-report.md
        echo "## Backend Coverage" >> coverage-report.md

        if [ -f "awesome-mail/coverage/coverage-summary.json" ]; then
          BACKEND_COVERAGE=$(node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('awesome-mail/coverage/coverage-summary.json', 'utf8'));
            const total = summary.total;
            console.log('Lines: ' + total.lines.pct + '%');
            console.log('Functions: ' + total.functions.pct + '%');
            console.log('Branches: ' + total.branches.pct + '%');
            console.log('Statements: ' + total.statements.pct + '%');
          ")
          echo "$BACKEND_COVERAGE" >> coverage-report.md
        else
          echo "Coverage summary not available." >> coverage-report.md
        fi

        echo "" >> coverage-report.md
        echo "## Flutter Coverage" >> coverage-report.md
        echo "Flutter coverage 因框架已知 segfault bug 停用，由子模組 CI 驗證測試。" >> coverage-report.md
        
    - name: Comment Coverage Report on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('coverage-report.md')) {
            const report = fs.readFileSync('coverage-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
          }

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        submodules: recursive
        token: ${{ secrets.SUBMODULE_PAT }}

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20'
        
    - name: Install Backend Dependencies
      working-directory: awesome-mail
      run: npm ci
      
    - name: Run Performance Tests
      working-directory: awesome-mail
      run: |
        # TODO: 實作效能測試腳本，目前為預留步驟
        # 預計整合 npm run test:performance
        echo "Running performance tests..."

    - name: Generate Performance Report
      run: |
        # TODO: 實作效能報告產生邏輯，目前為預留步驟
        # 預計產生並上傳效能指標
        echo "Performance test results would be generated here"