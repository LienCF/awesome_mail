name: Flutter CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'awesome_mail_flutter/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'awesome_mail_flutter/**'
      - '.github/workflows/flutter-ci.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test Flutter App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Verify dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub deps
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Analyze code
      working-directory: awesome_mail_flutter
      run: flutter analyze --fatal-infos
      
    - name: Check formatting
      working-directory: awesome_mail_flutter
      run: dart format --set-exit-if-changed .
      
    - name: Run unit tests
      working-directory: awesome_mail_flutter
      run: flutter test --test-randomize-ordering-seed random
      
    # Flutter coverage 因框架已知的 segfault bug 而停用
    # https://github.com/flutter/flutter/issues/124145
    # https://github.com/flutter/flutter/issues/128953
    # 測試通過即視為合格，coverage 由本地開發者自行驗證

  widget-test:
    name: Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Run widget tests
      working-directory: awesome_mail_flutter
      run: flutter test test/widget/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Run integration tests
      working-directory: awesome_mail_flutter
      run: flutter test integration_test/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, widget-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Java
      uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Build Android APK
      working-directory: awesome_mail_flutter
      run: flutter build apk --release
      
    - name: Build Android App Bundle
      working-directory: awesome_mail_flutter
      run: flutter build appbundle --release
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: android-apk
        path: awesome_mail_flutter/build/app/outputs/flutter-apk/app-release.apk
        
    - name: Upload AAB artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: android-aab
        path: awesome_mail_flutter/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    timeout-minutes: 20
    needs: [test, widget-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Build iOS (no codesign)
      working-directory: awesome_mail_flutter
      run: flutter build ios --release --no-codesign
      
    - name: Upload iOS build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ios-build
        path: awesome_mail_flutter/build/ios/iphoneos/Runner.app

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test, widget-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Build Web
      working-directory: awesome_mail_flutter
      run: flutter build web --release
      
    - name: Upload Web build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: web-build
        path: awesome_mail_flutter/build/web/

  build-desktop:
    name: Build Desktop
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [test, widget-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1 # v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
        
    - name: Enable desktop support
      working-directory: awesome_mail_flutter
      run: |
        flutter config --enable-linux-desktop
        flutter config --enable-windows-desktop
        flutter config --enable-macos-desktop
        
    - name: Get dependencies
      working-directory: awesome_mail_flutter
      run: flutter pub get
      
    - name: Run code generation
      working-directory: awesome_mail_flutter
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Build Desktop App
      working-directory: awesome_mail_flutter
      run: flutter build ${{ matrix.platform }} --release
      
    - name: Upload Desktop build artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ matrix.platform }}-build
        path: awesome_mail_flutter/build/${{ matrix.platform }}/